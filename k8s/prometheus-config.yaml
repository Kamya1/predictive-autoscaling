apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: autoscaling-experiments
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: "autoscaling-app"
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: autoscaling-app
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: "5000"

