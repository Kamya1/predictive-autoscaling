apiVersion: v1
kind: Service
metadata:
  name: autoscaling-app-svc
  namespace: autoscaling-experiments
  labels:
    app: autoscaling-app
spec:
  type: ClusterIP
  selector:
    app: autoscaling-app
  ports:
    - name: http
      port: 80
      targetPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: autoscaling-app-nodeport
  namespace: autoscaling-experiments
spec:
  type: NodePort
  selector:
    app: autoscaling-app
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30080

